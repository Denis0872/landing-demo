<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liza Alert Backend</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #1d1d1f;
            background: linear-gradient(180deg, #fff9f5 0%, #f7efe8 100%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(760px, 100%);
            padding: 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(29, 29, 31, 0.08);
            box-shadow: 0 24px 60px rgba(51, 30, 20, 0.08);
        }

        .eyebrow {
            display: inline-flex;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: rgba(214, 69, 47, 0.12);
            color: #b33c23;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: #5c524f;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
        }

        .primary {
            color: #fff;
            background: #d6452f;
        }

        .secondary {
            color: #1d1d1f;
            background: rgba(29, 29, 31, 0.08);
        }

        code {
            padding: 0.2rem 0.45rem;
            border-radius: 999px;
            background: rgba(29, 29, 31, 0.08);
        }
    </style>
</head>
<body>
<main class="panel">
    <span class="eyebrow">Backend only</span>
    <h1>Liza Alert Backend is running.</h1>
    <p>
        The temporary frontend has been removed from the backend project.
        Use the separate web application for UI development.
    </p>
    <div class="actions">
        <a class="primary" href="/api/v1/lost-cases">Open API</a>
        <a class="secondary" href="https://lizaalertspb.ru/api/v1/lost-cases">Check production API</a>
    </div>
</main>
</body>
</html>
